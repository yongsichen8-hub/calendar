server {
    listen 80;
    server_name _;  # 替换为你的域名或IP

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # API 反向代理
    location /calendar/api/ {
        rewrite ^/calendar(/api/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # 前端静态文件
    location /calendar/ {
        alias /opt/calendar/client/dist/;
        try_files $uri $uri/ /calendar/index.html;
    }

    # 静态资源缓存
    location ~* ^/calendar/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        alias /opt/calendar/client/dist/;
        rewrite ^/calendar/(.*)$ /$1 break;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 根路径重定向到 /calendar
    location = / {
        return 302 /calendar/;
    }
}
